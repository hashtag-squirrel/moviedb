<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — Movies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  {% load static %}
  <link rel="stylesheet" href="{% static 'movies/movies.css' %}" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="auth-back">← Movies</a>
      <h1 class="auth-title">Create account</h1>

      {% if error %}
        <div class="auth-alert auth-alert--error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/signup/">
        {% csrf_token %}
        <div class="auth-field">
          <label class="auth-label" for="username">Username</label>
          <input class="auth-input" type="text" id="username" name="username" autocomplete="username" autofocus />
        </div>
        <div class="auth-field">
          <label class="auth-label" for="password">Password</label>
          <input class="auth-input" type="password" id="password" name="password" autocomplete="new-password" />
        </div>
        <div class="auth-field">
          <label class="auth-label" for="password2">Confirm password</label>
          <input class="auth-input" type="password" id="password2" name="password2" autocomplete="new-password" />
        </div>
        <button class="auth-btn" type="submit">Sign up</button>
      </form>

      <p class="auth-footer">Already have an account? <a href="/login/" class="auth-link">Log in</a></p>
    </div>
  </div>

</body>
</html>
